<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meow Candy</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700;900&family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="CSS/style.css">
</head>
<body>

  <!-- ============================================================
       TELA DE ENTRADA
  ============================================================ -->
  <div class="intro-screen" id="introScreen">
    <div class="stars"></div>
    <div class="stars2"></div>
    <div class="pixel-cloud cloud-1"></div>
    <div class="pixel-cloud cloud-2"></div>
    <div class="pixel-cloud cloud-3"></div>
    <div class="pixel-ground"></div>
    <div class="pixel-bench"></div>
    <div class="pixel-lamp"></div>
    <div class="intro-logo-wrap">
      <img src="IMG/Candy_Machine.png" class="intro-logo" alt="Meow Candy Logo"
           onerror="this.style.display='none'; document.querySelector('.intro-logo-fallback').style.display='block'">
      <div class="intro-logo-fallback">
        <div class="fallback-title">MEOW</div>
        <div class="fallback-sub">CANDY</div>
      </div>
    </div>
    <button class="start-btn" onclick="iniciarJogo()"><span>START</span></button>
    <div class="press-start-text">PRESSIONE START PARA JOGAR</div>
  </div>

  <!-- ============================================================
       TELA DO JOGO
  ============================================================ -->
  <div class="game-screen" id="gameScreen" style="display:none;">

    <div class="lofi-bg" style="background-image: url('IMG/bg-site.gif') !important; background-size: cover !important; background-position: center !important;">
      <div class="lofi-sky"></div>
      <div class="lofi-window">
        <div class="lofi-city">
          <div class="building b1"></div><div class="building b2"></div>
          <div class="building b3"></div><div class="building b4"></div>
          <div class="building b5"></div><div class="building b6"></div>
          <div class="building b7"></div>
          <div class="lofi-moon"></div>
        </div>
        <div class="window-frame"></div>
        <div class="window-glow"></div>
      </div>
      <div class="lofi-floor"></div>
      <div class="lofi-floor-reflection"></div>
      <div class="lofi-plant">
        <div class="lp-leaves">
          <div class="lp-leaf lp-l1"></div>
          <div class="lp-leaf lp-l2"></div>
          <div class="lp-leaf lp-l3"></div>
        </div>
        <div class="lp-pot"></div>
      </div>
      <div class="string-lights">
        <div class="sl-wire"></div>
        <div class="sl-bulb" style="left:10%"></div>
        <div class="sl-bulb" style="left:22%"></div>
        <div class="sl-bulb" style="left:34%"></div>
        <div class="sl-bulb" style="left:46%"></div>
        <div class="sl-bulb" style="left:58%"></div>
        <div class="sl-bulb" style="left:70%"></div>
        <div class="sl-bulb" style="left:82%"></div>
        <div class="sl-bulb" style="left:92%"></div>
      </div>
    </div>

    <!-- CARTEIRA — 3 moedas fixas (R$1, R$2, R$5), clicáveis -->
    <div class="carteira" id="carteira"></div>

    <div class="scene">

      <!-- MÁQUINA -->
      <main class="machine" id="machine">
        <div class="machine-shell">

          <header class="machine-header">
            <div><div class="brand-neon">MEOW CANDY</div></div>
            <div class="brand-cat-led">
              <div class="led-dot"></div><div class="led-dot"></div><div class="led-dot"></div>
            </div>
          </header>

          <section class="glass-frame" id="glassFrame">
            <div class="shelf-light"></div>
            <div class="glass-reflection"></div>
            <div class="shelves" id="shelves"></div>
            <div class="cat-actor" id="catActor" aria-hidden="true">
              <div class="ca-ear-l"></div><div class="ca-ear-r"></div>
              <div class="ca-head"></div><div class="ca-nose"></div>
              <div class="ca-eye-l"></div><div class="ca-eye-r"></div>
              <div class="ca-body"></div><div class="ca-arm"></div>
              <div class="ca-item" id="catItem"></div>
              <div class="ca-tail"></div>
              <div class="ca-legs">
                <div class="ca-leg"></div><div class="ca-leg"></div>
                <div class="ca-leg"></div><div class="ca-leg"></div>
              </div>
            </div>
          </section>

          <div class="price-strip" id="priceStrip"></div>

          <section class="delivery-section">
            <div class="delivery-bin">
              <div class="delivery-flap" id="deliveryFlap"></div>
              <div class="delivery-inner" id="deliveryInner" onclick="removerDoce()"></div>
            </div>
          </section>

          <div class="machine-base">
            <div class="machine-feet">
              <div class="foot"></div><div class="foot"></div><div class="foot"></div>
            </div>
          </div>

        </div>
      </main>

      <!-- PAINEL LATERAL -->
      <aside class="side-panel">
        <div class="terminal-brand">
          <div class="terminal-brand-led"></div>
          <div class="terminal-brand-name">MEOW PAY</div>
        </div>
        <div class="visor-wrap">
          <div class="visor" id="visor">SALDO: R$0</div>
        </div>
        <section class="pay-section">
          <div class="pay-section-title">▸ CÓDIGO DO PRODUTO</div>
          <div class="teclado">
            <button onclick="pressionar(1)">1</button>
            <button onclick="pressionar(2)">2</button>
            <button onclick="pressionar(3)">3</button>
            <button onclick="pressionar(4)">4</button>
            <button onclick="pressionar(5)">5</button>
            <button onclick="pressionar(6)">6</button>
            <button onclick="pressionar(7)">7</button>
            <button onclick="pressionar(8)">8</button>
            <button onclick="pressionar(9)">9</button>
            <button class="btn-apagar" onclick="apagarCodigo()">←</button>
          </div>
        </section>
        <div class="acoes">
          <button class="botao-comprar" id="botaoComprar" onclick="comprar()" disabled>🍬 PEGAR DOCE</button>
          <button class="botao-finalizar" onclick="cancelarCompra()">✖ CANCELAR</button>
        </div>
        <section class="coin-entry-section">
          <div class="pay-section-title">▸ INSERIR MOEDA</div>
          <div class="entrada-moeda" id="slotMoeda">
            <span class="slot-hint">⬇ CLIQUE</span>
          </div>
        </section>
      </aside>

    </div>

    <!-- POPUP RELATÓRIO -->
    <div class="popup-overlay" id="popupOverlay" aria-hidden="true">
      <div class="popup-box">
        <header class="popup-head">
          <div>
            <div class="popup-title">RELATÓRIO DA SESSÃO</div>
            <div class="popup-sub">MEOW CANDY — AFD</div>
          </div>
          <div style="font-size:2rem">🐾</div>
        </header>
        <div class="popup-body" id="popupBody"></div>
        <footer class="popup-foot">
          <button class="popup-btn close-btn" onclick="continuarComprando()">▶ CONTINUAR COMPRANDO</button>
          <button class="popup-btn restart" onclick="novaSessao()">↺ NOVA SESSÃO</button>
        </footer>
      </div>
    </div>

    <!-- OVERLAY MIAU -->
    <div class="sobreposicao" id="overlayMiau">
      <div class="popup-miau">🐱 Miau! Pegue seus docinhos.</div>
    </div>

  </div>

  <script src="JS/script.js"></script>
</body>
</html>
